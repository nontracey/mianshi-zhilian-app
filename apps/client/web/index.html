  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body { 
      background-color: #0A0A0A; 
      overflow: hidden;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #E6EDF3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }
    .loading-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      opacity: 0.9;
    }
    .loading-text {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .loading-sub {
      font-size: 14px;
      color: #8B949E;
      margin-bottom: 32px;
    }
    .loading-bar {
      width: 200px;
      height: 3px;
      background: #2A2A2A;
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar-inner {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #3078F0, #5B9CF0);
      border-radius: 2px;
      animation: loading-slide 1.5s ease-in-out infinite;
    }
    .privacy-link {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      color: #8B949E;
      font-size: 13px;
      text-decoration: none;
    }
    .privacy-link:hover {
      color: #C9D1D9;
    }
    @keyframes loading-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    /* 隐藏 Flutter 加载过程中的闪烁 */
    .flutter-loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0A0A0A;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <img class="loading-logo" src="favicon.svg" alt="面试智练">
    <div class="loading-text">面试智练</div>
    <div class="loading-sub">AI 主动回忆学习工作台</div>
    <div class="loading-bar"><div class="loading-bar-inner"></div></div>
    <a class="privacy-link" href="privacy.html">隐私政策</a>
  </div>
  <script>
    // 当 Flutter 准备好时隐藏加载页面
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.3s';
        loading.style.opacity = '0';
        setTimeout(function() {
          loading.style.display = 'none';
        }, 300);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
