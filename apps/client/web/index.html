<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="面试智练 - AI 主动回忆学习工作台，帮你系统备战技术面试">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A2540">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="面试智练">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>面试智练</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background-color: #0A2540; }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .loading-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
    }
    .loading-text {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .loading-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
    }
    .loading-bar {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin-top: 24px;
      overflow: hidden;
    }
    .loading-bar-inner {
      width: 40%;
      height: 100%;
      background: #00CCF9;
      border-radius: 2px;
      animation: loading-slide 1.5s ease-in-out infinite;
    }
    @keyframes loading-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div class="loading">
    <img class="loading-logo" src="favicon.svg" alt="面试智练">
    <div class="loading-text">面试智练</div>
    <div class="loading-sub">AI 主动回忆学习工作台</div>
    <div class="loading-bar"><div class="loading-bar-inner"></div></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
