name: Deploy worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "workers/api/**"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci

      - name: Inject D1 database ID
        run: >
          sed -i "s/PLACEHOLDER_DATABASE_ID/${{ secrets.D1_DATABASE_ID }}/"
          wrangler.toml

      - name: Inject KV namespace ID
        run: >
          sed -i "s/PLACEHOLDER_KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/"
          wrangler.toml

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --project-name=mianshi-zhilian-api
          workingDirectory: workers/api
      - name: Verify primary and backup API routes
        run: |
          set -euo pipefail
          for base in \
            "https://mianshi-zhilian-api.pages.dev" \
            "https://mianshizhilian-api.nontracey.de5.net"
          do
            curl --fail --silent --show-error --retry 3 "$base/health" >/tmp/api-health.json
            curl --fail --silent --show-error --retry 3 "$base/update.json" >/tmp/update.json
            curl --fail --silent --show-error --retry 3 "$base/content/production/manifest.json" >/tmp/content-manifest.json
          done
