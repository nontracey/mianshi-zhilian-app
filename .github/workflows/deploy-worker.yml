name: Deploy worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "workers/api/**"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci

      - name: Inject D1 database ID
        run: >
          sed -i "s/PLACEHOLDER_DATABASE_ID/${{ secrets.D1_DATABASE_ID }}/"
          wrangler.toml

      - name: Inject R2 bucket name
        run: >
          sed -i "s/PLACEHOLDER_R2_BUCKET_NAME/${{ vars.R2_BUCKET_NAME }}/"
          wrangler.toml

      - name: Inject R2 public base URL
        run: |
          sed -i "s|PLACEHOLDER_R2_PUBLIC_BASE_URL|${{ vars.R2_PUBLIC_BASE_URL }}|" wrangler.toml
          grep -q "PLACEHOLDER_" wrangler.toml && {
            echo "::error::wrangler.toml still has unresolved PLACEHOLDER_ after injection"
            exit 1
          }

      - name: Put JWT secret
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::JWT_SECRET is not set in GitHub Secrets"
            exit 1
          fi
          printf '%s' "$JWT_SECRET" | npx wrangler secret put JWT_SECRET

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: workers/api
