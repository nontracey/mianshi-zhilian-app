name: Cleanup preview

# 这个 workflow 不使用 GITHUB_TOKEN（只用 CLOUDFLARE_API_TOKEN），
# 零权限可避免 GitHub 将它视为需要通知的安全事件。
# PR 删除逻辑由 GitHub 内置的 "Automatically delete head branches" 处理。

on:
  pull_request:
    types: [closed]

permissions: {}

concurrency:
  group: cleanup-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Cloudflare Pages preview deployments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH: ${{ github.head_ref }}
        run: |
          for project in mianshi-zhilian-app mianshi-zhilian-api; do
            echo "Checking $project for branch $BRANCH..."

            resp=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${project}/deployments" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json")
            success=$(echo "$resp" | python3 -c "import json,sys; print(json.load(sys.stdin).get('success', False))" 2>/dev/null || echo "false")

            if [ "$success" != "True" ]; then
              echo "Project $project not found or no access; skipping"
              continue
            fi

            ids=$(echo "$resp" | python3 -c "
import json, sys, os
branch = os.environ['BRANCH']
for d in json.load(sys.stdin).get('result', []):
    meta = d.get('deployment_trigger', {}).get('metadata', {})
    if meta.get('branch', '') == branch:
        print(d['id'])
" 2>/dev/null)

            if [ -z "$ids" ]; then
              echo "No preview deployments found for $project (branch: $BRANCH)"
              continue
            fi

            for id in $ids; do
              echo "Deleting $project deployment $id"
              curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${project}/deployments/$id" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" > /dev/null
              echo "Deleted: $id"
            done
          done
