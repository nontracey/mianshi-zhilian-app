name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk "mianshi-zhilian-${GITHUB_REF_NAME}-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/client/mianshi-zhilian-${{ github.ref_name }}-android.apk

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - run: cd build/web && zip -r "../../mianshi-zhilian-${GITHUB_REF_NAME}-web.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/client/mianshi-zhilian-${{ github.ref_name }}-web.zip

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package Windows build
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "mianshi-zhilian-${env:GITHUB_REF_NAME}-windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: apps/client/mianshi-zhilian-${{ github.ref_name }}-windows.zip

  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app "mianshi-zhilian-${GITHUB_REF_NAME}-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: apps/client/mianshi-zhilian-${{ github.ref_name }}-macos.zip

  publish:
    runs-on: ubuntu-latest
    needs: [android, web, windows, macos]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart scripts/build_update_manifest.dart "${GITHUB_REF_NAME}" release-assets
      - run: scripts/verify_release_assets.sh release-assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
