name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --target "${GITHUB_SHA}" --title "${GITHUB_REF_NAME}" --notes "面试智练 ${GITHUB_REF_NAME}"

  android:
    runs-on: ubuntu-latest
    needs: [prepare-release]
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/client/build
          key: android-build-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock', 'apps/client/android/**/*.gradle*', 'apps/client/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            android-build-${{ runner.os }}-
      - run: flutter pub get
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk "mianshi-zhilian-${GITHUB_REF_NAME}-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/client/mianshi-zhilian-${{ github.ref_name }}-android.apk
      - name: Upload Android APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/client/mianshi-zhilian-${{ github.ref_name }}-android.apk

  web:
    runs-on: ubuntu-latest
    needs: [prepare-release]
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: apps/client/build/web
          key: web-build-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock', 'apps/client/lib/**', 'apps/client/web/**') }}
          restore-keys: |
            web-build-${{ runner.os }}-
      - run: flutter pub get
      - run: flutter build web --release
      - run: cd build/web && zip -r "../../mianshi-zhilian-${GITHUB_REF_NAME}-web.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/client/mianshi-zhilian-${{ github.ref_name }}-web.zip
      - name: Upload Web package to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/client/mianshi-zhilian-${{ github.ref_name }}-web.zip

  windows:
    runs-on: windows-latest
    needs: [prepare-release]
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: apps/client/build/windows
          key: windows-build-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock', 'apps/client/lib/**', 'apps/client/windows/**') }}
          restore-keys: |
            windows-build-${{ runner.os }}-
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y
      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          $iss = @"
          [Setup]
          AppId={{8B6D7BCF-9D8E-4E8D-BE2D-1D2B8C2F5F31}
          AppName=面试智练
          AppVersion=$version
          AppPublisher=nontracey
          DefaultDirName={autopf}\Mianshi Zhilian
          DefaultGroupName=面试智练
          OutputDir=.
          OutputBaseFilename=mianshi-zhilian-${env:GITHUB_REF_NAME}-windows-setup
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\面试智练"; Filename: "{app}\mianshi_zhilian.exe"
          Name: "{autodesktop}\面试智练"; Filename: "{app}\mianshi_zhilian.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"

          [Run]
          Filename: "{app}\mianshi_zhilian.exe"; Description: "Launch 面试智练"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path installer.iss -Value $iss -Encoding UTF8
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss
      - name: Package Windows build
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "mianshi-zhilian-${env:GITHUB_REF_NAME}-windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            apps/client/mianshi-zhilian-${{ github.ref_name }}-windows-setup.exe
            apps/client/mianshi-zhilian-${{ github.ref_name }}-windows.zip
      - name: Upload Windows assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/client/mianshi-zhilian-${{ github.ref_name }}-windows-setup.exe
            apps/client/mianshi-zhilian-${{ github.ref_name }}-windows.zip

  macos:
    runs-on: macos-latest
    needs: [prepare-release]
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: |
            apps/client/build/macos
            apps/client/macos/Flutter/ephemeral
          key: macos-build-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock', 'apps/client/lib/**', 'apps/client/macos/**') }}
          restore-keys: |
            macos-build-${{ runner.os }}-
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Build drag-install DMG
        run: |
          rm -rf dmg-root
          mkdir -p dmg-root
          cp -R build/macos/Build/Products/Release/*.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "面试智练" -srcfolder dmg-root -ov -format UDZO "mianshi-zhilian-${GITHUB_REF_NAME}-macos.dmg"
      - run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app "mianshi-zhilian-${GITHUB_REF_NAME}-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            apps/client/mianshi-zhilian-${{ github.ref_name }}-macos.dmg
            apps/client/mianshi-zhilian-${{ github.ref_name }}-macos.zip
      - name: Upload macOS assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/client/mianshi-zhilian-${{ github.ref_name }}-macos.dmg
            apps/client/mianshi-zhilian-${{ github.ref_name }}-macos.zip

  update-manifest:
    runs-on: ubuntu-latest
    needs: [android, web, windows, macos]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart scripts/build_update_manifest.dart "${GITHUB_REF_NAME}" release-assets
      - run: scripts/verify_release_assets.sh release-assets
      - name: Upload update manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/update.json
