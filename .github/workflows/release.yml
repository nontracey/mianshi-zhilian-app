name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_notes: ${{ steps.generate_notes.outputs.notes }}
      app_version: ${{ steps.pubspec_version.outputs.version }}
      app_build_number: ${{ steps.pubspec_version.outputs.build_number }}
      api_base_url: ${{ steps.resolve_urls.outputs.api_base_url }}
      update_manifest_url: ${{ steps.resolve_urls.outputs.update_manifest_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read pubspec version
        id: pubspec_version
        working-directory: apps/client
        run: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION=${FULL_VERSION%%+*}
          BUILD_NUMBER=${FULL_VERSION##*+}
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pubspec version ${VERSION}" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Resolve API URLs
        id: resolve_urls
        run: |
          # 如果 GitHub Variable 未设置，回退到代码中的默认值
          API_URL="${API_BASE_URL_VAR:-https://mianshi-zhilian-api.pages.dev}"
          UPDATE_URL="${UPDATE_MANIFEST_URL_VAR:-https://mianshi-zhilian-api.pages.dev/update.json}"
          echo "api_base_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "update_manifest_url=$UPDATE_URL" >> "$GITHUB_OUTPUT"
        env:
          API_BASE_URL_VAR: ${{ vars.API_BASE_URL }}
          UPDATE_MANIFEST_URL_VAR: ${{ vars.UPDATE_MANIFEST_URL }}
      
      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "tag=$GITHUB_SHA" >> $GITHUB_OUTPUT
          else
            echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate release notes
        id: generate_notes
        run: |
          PREV_TAG=${{ steps.prev_tag.outputs.tag }}
          CURRENT_TAG=${GITHUB_REF_NAME}
          
          # 获取上一个版本号
          PREV_VERSION=${PREV_TAG#v}
          CURRENT_VERSION=${CURRENT_TAG#v}
          
          # 生成 changelog
          {
            echo "## v${CURRENT_VERSION}"
            echo ""
            echo "### 📦 版本更新"
            echo ""
            
            # 获取 commit messages，按类型分组
            FEAT_COMMITS=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"%s" | grep -i "^feat" | sed 's/^feat: //; s/^feat(.*)//' || true)
            FIX_COMMITS=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"%s" | grep -i "^fix" | sed 's/^fix: //; s/^fix(.*)//' || true)
            DOCS_COMMITS=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"%s" | grep -i "^docs" | sed 's/^docs: //; s/^docs(.*)//' || true)
            OTHER_COMMITS=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"%s" | grep -ivE "^(feat|fix|docs)" || true)
            
            if [ -n "$FEAT_COMMITS" ]; then
              echo "#### ✨ 新功能"
              echo "$FEAT_COMMITS" | while read -r line; do
                [ -n "$line" ] && echo "- $line"
              done
              echo ""
            fi
            
            if [ -n "$FIX_COMMITS" ]; then
              echo "#### 🐛 问题修复"
              echo "$FIX_COMMITS" | while read -r line; do
                [ -n "$line" ] && echo "- $line"
              done
              echo ""
            fi
            
            if [ -n "$DOCS_COMMITS" ]; then
              echo "#### 📝 文档更新"
              echo "$DOCS_COMMITS" | while read -r line; do
                [ -n "$line" ] && echo "- $line"
              done
              echo ""
            fi
            
            if [ -n "$OTHER_COMMITS" ]; then
              echo "#### 🔧 其他改动"
              echo "$OTHER_COMMITS" | while read -r line; do
                [ -n "$line" ] && echo "- $line"
              done
              echo ""
            fi
            
            # 统计
            TOTAL=$(git log ${PREV_TAG}..${CURRENT_TAG} --oneline | wc -l)
            echo "---"
            echo "**共 ${TOTAL} 个提交**"
          } > release_notes.md
          
          # 输出内容
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(cat release_notes.md)
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release_notes.md

  android:
    runs-on: ubuntu-latest
    needs: [prepare-release]
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/client/build
          key: android-build-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock', 'apps/client/android/**/*.gradle*', 'apps/client/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            android-build-${{ runner.os }}-
      - run: flutter pub get
      - run: bash tool/generate_version.sh
      - run: flutter build apk --release --dart-define=API_BASE_URL=${{ needs.prepare-release.outputs.api_base_url }} --dart-define=UPDATE_MANIFEST_URL=${{ needs.prepare-release.outputs.update_manifest_url }} --dart-define=APP_VERSION=${{ needs.prepare-release.outputs.app_version }} --dart-define=APP_BUILD_NUMBER=${{ needs.prepare-release.outputs.app_build_number }}
      - run: cp build/app/outputs/flutter-apk/app-release.apk "mianshi-zhilian-${GITHUB_REF_NAME}-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/client/mianshi-zhilian-${{ github.ref_name }}-android.apk
      - name: Upload Android APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/client/mianshi-zhilian-${{ github.ref_name }}-android.apk

  web:
    runs-on: ubuntu-latest
    needs: [prepare-release]
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: apps/client/build/web
          key: web-build-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.yaml', 'apps/client/pubspec.lock', 'apps/client/lib/**', 'apps/client/web/**') }}
          restore-keys: |
            web-build-${{ runner.os }}-
      - run: flutter pub get
      - run: bash tool/generate_version.sh
      - run: flutter build web --release --dart-define=API_BASE_URL=${{ needs.prepare-release.outputs.api_base_url }} --dart-define=UPDATE_MANIFEST_URL=${{ needs.prepare-release.outputs.update_manifest_url }} --dart-define=APP_VERSION=${{ needs.prepare-release.outputs.app_version }} --dart-define=APP_BUILD_NUMBER=${{ needs.prepare-release.outputs.app_build_number }}
      - run: cd build/web && zip -r "../../mianshi-zhilian-${GITHUB_REF_NAME}-web.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/client/mianshi-zhilian-${{ github.ref_name }}-web.zip
      - name: Upload Web package to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/client/mianshi-zhilian-${{ github.ref_name }}-web.zip

  windows:
    runs-on: windows-latest
    needs: [prepare-release]
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: apps/client/build/windows
          key: windows-build-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock', 'apps/client/lib/**', 'apps/client/windows/**') }}
          restore-keys: |
            windows-build-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Temp\chocolatey
          key: innosetup-${{ runner.os }}
      - run: flutter pub get
      - run: bash tool/generate_version.sh
      - run: flutter build windows --release --dart-define=API_BASE_URL=${{ needs.prepare-release.outputs.api_base_url }} --dart-define=UPDATE_MANIFEST_URL=${{ needs.prepare-release.outputs.update_manifest_url }} --dart-define=APP_VERSION=${{ needs.prepare-release.outputs.app_version }} --dart-define=APP_BUILD_NUMBER=${{ needs.prepare-release.outputs.app_build_number }}
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y
      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ needs.prepare-release.outputs.app_version }}"
          $iss = @"
          [Setup]
          AppId={{8B6D7BCF-9D8E-4E8D-BE2D-1D2B8C2F5F31}
          AppName=面试智练
          AppVersion=$version
          AppPublisher=nontracey
          DefaultDirName={autopf}\Mianshi Zhilian
          DefaultGroupName=面试智练
          OutputDir=.
          OutputBaseFilename=mianshi-zhilian-${env:GITHUB_REF_NAME}-windows-setup
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\面试智练"; Filename: "{app}\mianshi_zhilian.exe"
          Name: "{autodesktop}\面试智练"; Filename: "{app}\mianshi_zhilian.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"

          [Run]
          Filename: "{app}\mianshi_zhilian.exe"; Description: "Launch 面试智练"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path installer.iss -Value $iss -Encoding UTF8
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss
      - name: Package Windows build
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "mianshi-zhilian-${env:GITHUB_REF_NAME}-windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            apps/client/mianshi-zhilian-${{ github.ref_name }}-windows-setup.exe
            apps/client/mianshi-zhilian-${{ github.ref_name }}-windows.zip
      - name: Upload Windows assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/client/mianshi-zhilian-${{ github.ref_name }}-windows-setup.exe
            apps/client/mianshi-zhilian-${{ github.ref_name }}-windows.zip

  macos:
    runs-on: macos-latest
    needs: [prepare-release]
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: |
            apps/client/build/macos
            apps/client/macos/Flutter/ephemeral
            ~/Library/Developer/Xcode/DerivedData
          key: macos-build-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock', 'apps/client/lib/**', 'apps/client/macos/**') }}
          restore-keys: |
            macos-build-${{ runner.os }}-
      - run: flutter pub get
      - run: bash tool/generate_version.sh
      - run: flutter build macos --release --dart-define=API_BASE_URL=${{ needs.prepare-release.outputs.api_base_url }} --dart-define=UPDATE_MANIFEST_URL=${{ needs.prepare-release.outputs.update_manifest_url }} --dart-define=APP_VERSION=${{ needs.prepare-release.outputs.app_version }} --dart-define=APP_BUILD_NUMBER=${{ needs.prepare-release.outputs.app_build_number }}
      - name: Build drag-install DMG
        run: |
          rm -rf dmg-root
          mkdir -p dmg-root
          cp -R build/macos/Build/Products/Release/*.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "面试智练" -srcfolder dmg-root -ov -format UDZO "mianshi-zhilian-${GITHUB_REF_NAME}-macos.dmg"
      - run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app "mianshi-zhilian-${GITHUB_REF_NAME}-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            apps/client/mianshi-zhilian-${{ github.ref_name }}-macos.dmg
            apps/client/mianshi-zhilian-${{ github.ref_name }}-macos.zip
      - name: Upload macOS assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/client/mianshi-zhilian-${{ github.ref_name }}-macos.dmg
            apps/client/mianshi-zhilian-${{ github.ref_name }}-macos.zip

  update-manifest:
    runs-on: ubuntu-latest
    needs: [android, web, windows, macos]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Extract release notes from git log
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          CURRENT_TAG=${GITHUB_REF_NAME}
          # 提取 feat/fix 提交的标题，用 | 分隔
          NOTES=$(git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"%s" | grep -iE "^(feat|fix)" | sed 's/^feat: //;s/^feat(.*)//;s/^fix: //;s/^fix(.*)//' | head -10 | tr '\n' '|' | sed 's/|$//')
          echo "release_notes=$NOTES" >> "$GITHUB_OUTPUT"
      - run: dart scripts/build_update_manifest.dart "${GITHUB_REF_NAME}" release-assets
        env:
          MINIMUM_REQUIRED_VERSION: ${{ vars.MINIMUM_REQUIRED_VERSION }}
          RELEASE_NOTES: ${{ steps.notes.outputs.release_notes }}
      - run: scripts/verify_release_assets.sh release-assets
      - name: Upload update manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/update.json
      - name: Publish release as latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
