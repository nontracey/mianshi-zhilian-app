name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      
      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: |
            apps/client/.dart_tool
          key: flutter-cache-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock') }}
          restore-keys: |
            flutter-cache-${{ runner.os }}-
      
      - run: flutter pub get
      - run: bash tool/generate_version.sh
      - run: test -f lib/generated/app_version.g.dart
      - run: python3 lib/l10n/check_l10n_keys.py
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
      - run: flutter build web --release

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/api
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci
      - run: npm run check:migrations
      - run: npm run typecheck 2>/dev/null || npx tsc --noEmit
      - run: npm test
      - run: npm run lint 2>/dev/null || echo 'lint not configured, skipping'
