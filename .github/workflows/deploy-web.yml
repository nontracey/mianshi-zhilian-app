name: Deploy web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/client/**"
      - ".github/workflows/deploy-web.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/client/**"
      - ".github/workflows/deploy-web.yml"

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: apps/client/build/web
          key: web-deploy-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.yaml', 'apps/client/pubspec.lock', 'apps/client/lib/**', 'apps/client/web/**') }}
          restore-keys: |
            web-deploy-${{ runner.os }}-
      - run: flutter pub get
      - run: bash tool/generate_version.sh
      - name: Read pubspec version
        run: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "APP_VERSION=${FULL_VERSION%%+*}" >> "$GITHUB_ENV"
          echo "APP_BUILD_NUMBER=${FULL_VERSION##*+}" >> "$GITHUB_ENV"
      - run: flutter build web --release --dart-define=APP_VERSION=${{ env.APP_VERSION }} --dart-define=APP_BUILD_NUMBER=${{ env.APP_BUILD_NUMBER }}
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=mianshi-zhilian-app --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true --commit-message="deploy ${{ github.sha }}"
          workingDirectory: apps/client

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ github.head_ref }}';
            const safeBranch = branch.replace(/\//g, '-');
            const deployUrl = `https://${safeBranch}.mianshi-zhilian-app.pages.dev`;
            const body = `## 🚀 预览部署完成\n\n[预览地址](${deployUrl})\n\n分支 \`${branch}\` 已部署。PR 合并或关闭后自动清理。`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Verify production routes
        if: github.ref_name == 'main'
        run: |
          set -euo pipefail
          for base in \
            "https://mianshi-zhilian-app.pages.dev" \
            "https://mianshizhilian-app.nontracey.de5.net"
          do
            curl --fail --silent --show-error --retry 3 "$base/" >/tmp/app-index.html
          done
