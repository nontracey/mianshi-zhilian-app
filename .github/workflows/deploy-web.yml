name: Deploy web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/client/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: apps/client/build/web
          key: web-deploy-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.yaml', 'apps/client/pubspec.lock', 'apps/client/lib/**', 'apps/client/web/**') }}
          restore-keys: |
            web-deploy-${{ runner.os }}-
      - run: flutter pub get
      - run: bash tool/generate_version.sh
      - name: Read pubspec version
        run: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "APP_VERSION=${FULL_VERSION%%+*}" >> "$GITHUB_ENV"
          echo "APP_BUILD_NUMBER=${FULL_VERSION##*+}" >> "$GITHUB_ENV"
      - name: Resolve dart-define variables
        run: |
          # 如果 GitHub Variable 未设置，回退到默认值，避免传空字符串覆盖代码里的默认值
          echo "RESOLVED_API_BASE_URL=${API_BASE_URL:-https://mianshi-zhilian-api.nontracey.workers.dev}" >> "$GITHUB_ENV"
          echo "RESOLVED_UPDATE_MANIFEST_URL=${UPDATE_MANIFEST_URL:-https://mianshi-zhilian-api.nontracey.workers.dev/update.json}" >> "$GITHUB_ENV"
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          UPDATE_MANIFEST_URL: ${{ vars.UPDATE_MANIFEST_URL }}
      - run: flutter build web --release --dart-define=API_BASE_URL=${{ env.RESOLVED_API_BASE_URL }} --dart-define=UPDATE_MANIFEST_URL=${{ env.RESOLVED_UPDATE_MANIFEST_URL }} --dart-define=APP_VERSION=${{ env.APP_VERSION }} --dart-define=APP_BUILD_NUMBER=${{ env.APP_BUILD_NUMBER }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=mianshi-zhilian-app --commit-dirty=true --commit-message="deploy ${{ github.sha }}"
          workingDirectory: apps/client
