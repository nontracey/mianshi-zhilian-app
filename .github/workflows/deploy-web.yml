name: Deploy web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/client/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: apps/client/build/web
          key: web-deploy-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock', 'apps/client/lib/**', 'apps/client/web/**') }}
          restore-keys: |
            web-deploy-${{ runner.os }}-
      - run: flutter pub get
      - name: Generate version.json
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          mkdir -p web
          cat > web/version.json << EOF
          {
            "version": "$VERSION",
            "buildNumber": "$BUILD",
            "releaseDate": "$(date -u +%Y-%m-%d)"
          }
          EOF
          echo "Generated web/version.json: version=$VERSION build=$BUILD"
      - run: flutter build web --release --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }} --dart-define=UPDATE_MANIFEST_URL=${{ vars.UPDATE_MANIFEST_URL }} --dart-define=APP_VERSION=${{ env.APP_VERSION }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=mianshi-zhilian-app --commit-dirty=true --commit-message="deploy ${{ github.sha }}"
          workingDirectory: apps/client
