name: Deploy web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/client/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: apps/client/build/web
          key: web-deploy-${{ runner.os }}-${{ hashFiles('apps/client/pubspec.lock', 'apps/client/lib/**', 'apps/client/web/**') }}
          restore-keys: |
            web-deploy-${{ runner.os }}-
      - run: flutter pub get
      - run: flutter build web --release
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=mianshi-zhilian-app
          workingDirectory: apps/client
