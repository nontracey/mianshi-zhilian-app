name = "mianshi-zhilian-api"
compatibility_date = "2026-05-27"

# Pages Functions 的绑定配置与 Workers 格式一致。
# 本地开发：wrangler pages dev src/
# 生产部署：wrangler pages deploy --project-name=mianshi-zhilian-api src/

[[kv_namespaces]]
binding = "KV"
# PLACEHOLDER_KV_NAMESPACE_ID 由 CI（deploy-worker.yml）在部署前通过 sed 替换为
# GitHub Secrets 中的 KV_NAMESPACE_ID，避免将真实 namespace_id 硬编码在仓库中。
id = "PLACEHOLDER_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "mianshi-zhilian-db"
# PLACEHOLDER_DATABASE_ID 由 CI（deploy-worker.yml）在部署前通过 sed 替换为
# GitHub Secrets 中的 D1_DATABASE_ID，避免将真实 database_id 硬编码在仓库中。
database_id = "PLACEHOLDER_DATABASE_ID"

[vars]
CONTENT_MANIFEST_URL = "https://mianshi-zhilian-content.pages.dev/manifest.json"
TEST_CONTENT_BASE_URL = "https://mianshi-zhilian-content.pages.dev"
PROD_CONTENT_BASE_URL = "https://mianshi-zhilian-content.pages.dev"
# PLACEHOLDER_JWT_SECRET 由 CI 在部署前替换
JWT_SECRET = "PLACEHOLDER_JWT_SECRET"